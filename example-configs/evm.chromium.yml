root: /path/to/chromium/
remoteBuild: siso
defaultTarget: chrome
execName: Chromium
gen:
  args:
    - use_remoteexec = true
    - use_reclient = false
    - use_siso = true
    - is_debug = false
  out: Default
env:
  GIT_CACHE_PATH: /Users/user_name/.git_cache
$schema: file:///Users/user_name/.electron_build_tools/evm-config.schema.json
